transform_layer:
  outputs:
    docker:
      type: postgres
      # Use this target when running dbt inside Airflow container.
      host: postgres
      user: airflow
      pass: airflow
      port: 5432
      dbname: airflow
      schema: public
      threads: 4
    local:
      type: postgres
      # Use this target when running dbt from Windows host.
      host: 127.0.0.1
      user: airflow
      pass: airflow
      port: 5433
      dbname: airflow
      schema: public
      threads: 4
  target: docker